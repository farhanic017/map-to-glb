name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Map to GLB ${{ github.ref_name }}"
          releaseBody: |
            ## Download & Install

            | Platform | File | How to install |
            |----------|------|----------------|
            | **Windows** | `*-x64-setup.exe` | Double-click to install |
            | **macOS** | `*-aarch64.dmg` | Open DMG, drag app to Applications |
            | **Linux (Debian/Ubuntu)** | `*_amd64.deb` | `sudo dpkg -i *.deb` |
            | **Linux (Portable)** | `*.AppImage` | `chmod +x *.AppImage && ./*.AppImage` |
          releaseDraft: false
          prerelease: false
          args: "--target ${{ matrix.target }}"
